
   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert Page</title>
    <style>
        /* Dark background for the main page */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
        }

        /* Fullscreen dark overlay that sits on top of everything */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
            z-index: 9999;           /* Ensures it stays on top */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        /* The actual popup box in the center */
        .popup-box {
            background-color: #222;
            color: #ff3333;
            padding: 30px;
            border: 2px solid #ff3333;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(255, 51, 51, 0.5);
            max-width: 400px;
            width: 80%;
        }

        .popup-box h2 {
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
        }

        .popup-box button {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 15px;
        }

        .popup-box button:hover {
            background-color: #cc0000;
        }

        /* Class to make the overlay visible via JavaScript */
        .overlay.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <!-- The Popup Structure -->
    <div id="hackPopup" class="overlay">
        <div class="popup-box">
            <h2>System Warning</h2>
            <p>You are hacked!</p>
            <button onclick="closePopup()">Dismiss</button>
        </div>
    </div>

    <script>
        // Trigger the custom popup as soon as the DOM is fully loaded
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("hackPopup").classList.add("show");
        });

        // Function to close the popup when the button is clicked
        function closePopup() {
            document.getElementById("hackPopup").classList.remove("show");
        }
    </script>

</body>
</html>
