<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Alert</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="popup">
        <div class="popup-header">
            <span class="icon">⚠️</span>
            <h2>SYSTEM BREACH</h2>
        </div>
        <div class="popup-body">
            <p>Your device has been infected. All files are currently being encrypted.</p>
            <p class="warning">Do not restart or disconnect your device!</p>
        </div>
        <div class="popup-footer">
            <button class="action-btn" onclick="alert('System locked! Initiating transfer...')">Acknowledge</button>
        </div>
    </div>

</body>
</html>
